<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>貪食蛇遊戲</title>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <!-- Setting button -->
        <button title="遊戲設定" type="button" id="open-setting" class="setting-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-gear-fill"
                viewBox="0 0 16 16">
                <path
                    d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z" />
            </svg>
        </button>
        <p id="current-score">分數</p>
        <p id="highest-score">最高分數</p>
        <div id="button-area">
            <button class="game-button" type="button" id="start">開始遊戲</button>
            <button title="暫停遊戲" class="game-button hidden" type="button" id="toggle-pause">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-pause-fill" viewBox="0 0 16 16">
                    <path
                        d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5" />
                </svg>
            </button>
        </div>
        <!-- The width and height of the canvas should be the multiple of 10 -->
        <canvas id="game-area" width="320" height="320">

        </canvas>

        <!-- Setting screen -->
        <div id="setting-page">
            <button type="button" title="關閉遊戲設定" id="close-setting" class="setting-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x"
                    viewBox="0 0 16 16">
                    <path
                        d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708" />
                </svg>
            </button>
            <div id="setting-menu">
                <h2>遊戲設定</h2>
                <form id="setting-form">
                    <div class="setting-item">
                        <label for="speed">速度</label>
                        <select name="speed" id="speed">
                        </select>
                    </div>
                    <div class="setting-item setting-item-checkbox">
                        <label for="wall">允許蛇穿牆</label>
                        <input type="checkbox" name="wall" id="wall">
                    </div>
                    <div>
                        <input type="button" class="form-button" id="save-setting" value="儲存設定">
                        <input type="button" class="form-button" id="reset-setting" value="重設設定">
                    </div>
                </form>
                <input type="button" class="form-button" id="reset-highest-score" value="重設最高分數">
            </div>
        </div>

        <script src="./script.js"></script>
        <script src="./app.js"></script>
    </body>

</html>
